name: Build Debug APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_tests:
        description: "Run unit tests before building"
        type: boolean
        default: false

concurrency:
  group: build-debug-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.5.1'
          cache-disabled: false

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-36 build-tools;36.0.0'
          accept-android-sdk-licenses: true

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 9.5.1 --distribution-type bin

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Prepare .env from example
        run: cp .env.example .env

      - name: Generate debug keystore
        run: |
          keytool -genkeypair \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -storepass android \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Run unit tests
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_tests }}
        run: ./gradlew testDebugUnitTest --no-daemon --stacktrace
        continue-on-error: true

      - name: Assemble debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Locate built APK
        id: locate_apk
        run: |
          APK_PATH=$(find app/build/outputs/apk/debug -maxdepth 2 -name "*.apk" -type f | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "APK not found in app/build/outputs/apk/debug"
            ls -la app/build/outputs/ 2>/dev/null || true
            exit 1
          fi
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "Found APK: $APK_PATH"
          echo "Size: $(du -h "$APK_PATH" | cut -f1)"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: scooter-rent-debug-apk
          path: ${{ steps.locate_apk.outputs.apk_path }}
          if-no-files-found: error
          retention-days: 30

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            app/build/outputs/logs/
            app/build/reports/
          if-no-files-found: ignore
          retention-days: 7
