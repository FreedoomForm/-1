name: Build Debug APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_tests:
        description: "Run unit tests before building"
        type: boolean
        default: false

concurrency:
  group: build-debug-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.5.1'
          cache-disabled: false

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-36 build-tools;36.0.0'
          accept-android-sdk-licenses: true

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 9.5.1 --distribution-type bin

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Prepare .env from example
        run: cp .env.example .env

      - name: Verify committed debug keystore exists
        run: |
          if [ ! -f debug.keystore ]; then
            echo "ERROR: debug.keystore not found in repo!"
            echo "The keystore must be committed to ensure all CI builds use the same signing key."
            echo "Without it, in-app updates fail with INSTALL_FAILED_UPDATE_INCOMPATIBLE."
            exit 1
          fi
          echo "debug.keystore found:"
          keytool -list -keystore debug.keystore -storepass android 2>&1 | head -5

      - name: Run unit tests
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_tests }}
        run: ./gradlew testDebugUnitTest --no-daemon --stacktrace
        continue-on-error: true

      # ── Внедрение номера сборки в versionCode/versionName ───────────────
      # ВАЖНО: этот шаг ДОЛЖЕН выполняться ДО assembleDebug, чтобы собранный
      # APK реально содержал внедрённый versionCode. Раньше шаг шёл ПОСЛЕ
      # сборки — APK имел versionCode из build.gradle.kts (106), а тело релиза
      # заявляло versionCode = run_number → PackageInstaller отказывался
      # устанавливать APK с тем же/меньшим versionCode поверх существующего
      # приложения → «O'rnatish muvaffaqiyatsiz».
      - name: Inject build number into versionName and versionCode
        id: version
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: |
          BASE_VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*versionName.*=.*"\(.*\)".*/\1/')
          FULL_VERSION="${BASE_VERSION}.${{ github.run_number }}"
          echo "Base version: $BASE_VERSION"
          echo "Full version: $FULL_VERSION"
          # Update versionName to include build number (e.g. "1.2.106" → "1.2.106.131")
          sed -i "s/versionName = \"$BASE_VERSION\"/versionName = \"$FULL_VERSION\"/" app/build.gradle.kts
          # Update versionCode to run_number so Android sees it as a newer build
          sed -i "s/versionCode = [0-9]*/versionCode = ${{ github.run_number }}/" app/build.gradle.kts
          echo "version=$FULL_VERSION" >> "$GITHUB_OUTPUT"
          echo "versionCode=${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          echo "Updated build.gradle.kts:"
          grep -E 'versionCode|versionName' app/build.gradle.kts

      - name: Assemble debug APK
        run: ./gradlew clean assembleDebug --no-daemon --stacktrace

      - name: Locate built APK
        id: locate_apk
        run: |
          APK_PATH=$(find app/build/outputs/apk/debug -maxdepth 2 -name "*.apk" -type f | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "APK not found in app/build/outputs/apk/debug"
            ls -la app/build/outputs/ 2>/dev/null || true
            exit 1
          fi
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "Found APK: $APK_PATH"
          echo "Size: $(du -h "$APK_PATH" | cut -f1)"

      # ── Проверка: убеждаемся, что APK содержит правильный versionCode ──
      # Это страховка: если шаг внедрения не сработал, сборка упадёт здесь,
      # а не молча выложит нерабочий релиз.
      - name: Verify APK versionCode matches run number
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: |
          set +e
          # Находим aapt2/aapt в SDK. Пробуем несколько известных переменных
          # окружения runner'а — ANDROID_HOME и ANDROID_SDK_ROOT.
          SDK_ROOT="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}}"
          echo "SDK_ROOT=$SDK_ROOT"
          AAPT=""
          if [ -d "$SDK_ROOT/build-tools" ]; then
            # Берём самую свежую версию build-tools
            BT_DIR=$(ls -1d "$SDK_ROOT/build-tools"/*/ 2>/dev/null | sort -V | tail -1)
            echo "Latest build-tools dir: $BT_DIR"
            if [ -n "$BT_DIR" ]; then
              if [ -x "$BT_DIR/aapt2" ]; then
                AAPT="$BT_DIR/aapt2"
              elif [ -x "$BT_DIR/aapt" ]; then
                AAPT="$BT_DIR/aapt"
              fi
            fi
          fi
          if [ -z "$AAPT" ]; then
            echo "WARNING: aapt not found in $SDK_ROOT — skipping versionCode verification (non-fatal)"
            exit 0
          fi
          echo "Using AAPT: $AAPT"
          APK="${{ steps.locate_apk.outputs.apk_path }}"
          BADGING=$("$AAPT" dump badging "$APK" 2>/dev/null)
          # aapt2: package: name='...' versionCode='113' versionName='1.2.106.113' ...
          APK_VERSION_CODE=$(echo "$BADGING" | grep -oE "versionCode='[0-9]+'" | head -1 | grep -oE "[0-9]+")
          APK_VERSION_NAME=$(echo "$BADGING" | grep -oE "versionName='[^']+'" | head -1 | sed "s/versionName='//; s/'$//")
          echo "APK versionCode: $APK_VERSION_CODE"
          echo "APK versionName: $APK_VERSION_NAME"
          echo "Expected versionCode: ${{ github.run_number }}"
          if [ -z "$APK_VERSION_CODE" ]; then
            echo "WARNING: Could not parse versionCode from APK — skipping verification (non-fatal)"
            exit 0
          fi
          if [ "$APK_VERSION_CODE" != "${{ github.run_number }}" ]; then
            echo "ERROR: APK versionCode ($APK_VERSION_CODE) does not match run number (${{ github.run_number }})!"
            echo "This means the version injection did not take effect before assembleDebug."
            exit 1
          fi
          echo "OK: APK versionCode matches run number."

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: scooter-rent-debug-apk
          path: ${{ steps.locate_apk.outputs.apk_path }}
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release with APK
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: "Scooter Rent v${{ steps.version.outputs.version }}"
          body: |
            Автоматическая сборка из коммита ${{ github.sha }}

            versionCode:${{ github.run_number }}

            📱 **Установка**: Скачайте `app-debug.apk` и откройте на устройстве Android.

            Если у вас уже установлено приложение — просто установите APK поверх.
            Данные сохранятся автоматически.
          files: |
            ${{ steps.locate_apk.outputs.apk_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            app/build/outputs/logs/
            app/build/reports/
          if-no-files-found: ignore
          retention-days: 7
